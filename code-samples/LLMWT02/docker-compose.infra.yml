name: myapp-infra

services:
  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-latest
    container_name: myapp-cosmos
    command: ["--protocol", "https"]
    ports:
      - "8080:8080"
      - "8081:8081"
      - "1234:1234"
    volumes:
      - cosmos-data:/data

  caddy:
    image: caddy:2
    container_name: myapp-caddy
    ports:
      - "8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${HOME}/.config/myapp/caddy:/etc/caddy:ro"

volumes:
  cosmos-data: