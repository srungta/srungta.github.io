<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; base-uri 'self'; object-src 'none'; frame-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' https://www.google-analytics.com https://*.clarity.ms https://cdn.jsdelivr.net; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.google-analytics.com https://*.clarity.ms https://c.bing.com; font-src 'self' data:; connect-src 'self' https://*.google-analytics.com https://*.clarity.ms https://c.bing.com; manifest-src 'self'; media-src 'self'; worker-src 'self';">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{'/assets/main.css'| relative_url }}">
    {%- feed_meta -%}

    {%- include google-analytics.html -%}
    {%- endif -%}

    <link rel="apple-touch-icon" sizes="180x180" href="{{'/assets/images/favicon/apple-touch-icon.png'|relative_url}}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{'/assets/images/favicon/favicon-32x32.png'|relative_url}}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{'/assets/images/favicon/favicon-16x16.png'|relative_url}}">
