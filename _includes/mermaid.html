<style>
  .mermaid {
    overflow-x: auto;
    text-align: center;
  }

  .mermaid svg {
    height: auto;
    max-width: 100%;
  }
</style>
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

  for (const block of document.querySelectorAll('.language-mermaid')) {
    const code = block.matches('code') ? block : block.querySelector('code');
    if (!code) continue;

    const diagram = document.createElement('pre');
    diagram.className = 'mermaid';
    diagram.textContent = code.textContent;

    const wrapper = block.matches('code') ? block.parentElement : block;
    wrapper.replaceWith(diagram);
  }

  mermaid.initialize({ startOnLoad: false, securityLevel: 'strict', theme: 'neutral' });
  await mermaid.run({ querySelector: '.mermaid' });
</script>
