<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="760" height="320" fill="#0d1117" rx="12"/>

  <!-- ASCII side -->
  <rect x="30" y="20" width="320" height="280" rx="10" fill="#111b27" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="190" y="48" fill="#58a6ff" font-size="13" font-weight="700" text-anchor="middle">ASCII  (1963)</text>
  <text x="190" y="66" fill="#8b949e" font-size="11" text-anchor="middle">128 characters · 7 bits</text>

  <!-- ASCII grid sample -->
  <text x="60"  y="95"  fill="#e6edf3" font-size="12" font-family="monospace">A=65   B=66   C=67</text>
  <text x="60"  y="113" fill="#e6edf3" font-size="12" font-family="monospace">a=97   b=98   c=99</text>
  <text x="60"  y="131" fill="#e6edf3" font-size="12" font-family="monospace">0=48   1=49   2=50</text>
  <text x="60"  y="149" fill="#e6edf3" font-size="12" font-family="monospace">!=33   ?=63   @=64</text>

  <line x1="55" y1="165" x2="325" y2="165" stroke="#30363d" stroke-width="1"/>

  <text x="190" y="188" fill="#8b949e" font-size="11" text-anchor="middle">Coverage</text>
  <rect x="55"  y="197" width="270" height="14" rx="4" fill="#21262d"/>
  <rect x="55"  y="197" width="40"  height="14" rx="4" fill="#1f6feb"/>
  <text x="303" y="208" fill="#8b949e" font-size="10">~0.03%</text>

  <text x="190" y="230" fill="#3fb950" font-size="11" text-anchor="middle">✓ Simple   ✓ Fast   ✓ 1 byte = 1 char</text>
  <text x="190" y="250" fill="#f85149" font-size="11" text-anchor="middle">✗ English only   ✗ No accents</text>
  <text x="190" y="268" fill="#f85149" font-size="11" text-anchor="middle">✗ No emoji   ✗ No CJK   ✗ No Arabic</text>

  <!-- Arrow -->
  <text x="380" y="168" fill="#8b949e" font-size="22" text-anchor="middle">→</text>
  <text x="380" y="188" fill="#8b949e" font-size="9"  text-anchor="middle">60 years</text>

  <!-- Unicode side -->
  <rect x="410" y="20" width="320" height="280" rx="10" fill="#111b27" stroke="#3fb950" stroke-width="1.5"/>
  <text x="570" y="48" fill="#3fb950" font-size="13" font-weight="700" text-anchor="middle">Unicode  (2023)</text>
  <text x="570" y="66" fill="#8b949e" font-size="11" text-anchor="middle">149,813 characters · up to 21 bits</text>

  <text x="430" y="95"  fill="#e6edf3" font-size="12" font-family="monospace">A    = U+0041</text>
  <text x="430" y="113" fill="#e6edf3" font-size="12" font-family="monospace">Ä    = U+00C4</text>
  <text x="430" y="131" fill="#e6edf3" font-size="12" font-family="monospace">字   = U+5B57</text>
  <text x="430" y="149" fill="#e6edf3" font-size="12" font-family="monospace">💩  = U+1F4A9</text>

  <line x1="425" y1="165" x2="715" y2="165" stroke="#30363d" stroke-width="1"/>

  <text x="570" y="188" fill="#8b949e" font-size="11" text-anchor="middle">Coverage</text>
  <rect x="425" y="197" width="270" height="14" rx="4" fill="#21262d"/>
  <rect x="425" y="197" width="270" height="14" rx="4" fill="#3fb950"/>
  <text x="703" y="208" fill="#8b949e" font-size="10">~100%</text>

  <text x="570" y="230" fill="#3fb950" font-size="11" text-anchor="middle">✓ Every language   ✓ Emoji   ✓ Math</text>
  <text x="570" y="250" fill="#f85149" font-size="11" text-anchor="middle">✗ Variable byte width   ✗ Combining chars</text>
  <text x="570" y="268" fill="#f85149" font-size="11" text-anchor="middle">✗ Multiple encodings   ✗ Edge cases</text>
</svg>
