<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="760" height="300" fill="#0d1117" rx="12"/>

  <text x="380" y="34" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">How  👨‍👩‍👧‍👦  is built from invisible glue</text>

  <!-- Steps -->
  <!-- Step 1: Man -->
  <rect x="30" y="56" width="100" height="80" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="80" y="95"  font-size="30" text-anchor="middle">👨</text>
  <text x="80" y="118" fill="#8b949e" font-size="10" text-anchor="middle">U+1F468</text>
  <text x="80" y="130" fill="#58a6ff" font-size="9"  text-anchor="middle">Man</text>
  <text x="80" y="148" fill="#8b949e" font-size="9"  text-anchor="middle">4 bytes</text>

  <!-- ZWJ 1 -->
  <rect x="148" y="76" width="52" height="40" rx="6" fill="#21262d" stroke="#6e7681" stroke-width="1"/>
  <text x="174" y="93"  fill="#6e7681" font-size="9"  text-anchor="middle">ZWJ</text>
  <text x="174" y="106" fill="#6e7681" font-size="8"  text-anchor="middle">U+200D</text>
  <text x="80"  y="158" fill="#6e7681" font-size="9" text-anchor="middle">+</text>
  <text x="174" y="158" fill="#6e7681" font-size="9" text-anchor="middle">+</text>

  <!-- Step 2: Woman -->
  <rect x="218" y="56" width="100" height="80" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="268" y="95"  font-size="30" text-anchor="middle">👩</text>
  <text x="268" y="118" fill="#8b949e" font-size="10" text-anchor="middle">U+1F469</text>
  <text x="268" y="130" fill="#58a6ff" font-size="9"  text-anchor="middle">Woman</text>
  <text x="268" y="148" fill="#8b949e" font-size="9"  text-anchor="middle">4 bytes</text>

  <!-- ZWJ 2 -->
  <rect x="336" y="76" width="52" height="40" rx="6" fill="#21262d" stroke="#6e7681" stroke-width="1"/>
  <text x="362" y="93"  fill="#6e7681" font-size="9"  text-anchor="middle">ZWJ</text>
  <text x="362" y="106" fill="#6e7681" font-size="8"  text-anchor="middle">U+200D</text>
  <text x="268" y="158" fill="#6e7681" font-size="9" text-anchor="middle">+</text>
  <text x="362" y="158" fill="#6e7681" font-size="9" text-anchor="middle">+</text>

  <!-- Step 3: Girl -->
  <rect x="406" y="56" width="100" height="80" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="456" y="95"  font-size="30" text-anchor="middle">👧</text>
  <text x="456" y="118" fill="#8b949e" font-size="10" text-anchor="middle">U+1F467</text>
  <text x="456" y="130" fill="#58a6ff" font-size="9"  text-anchor="middle">Girl</text>
  <text x="456" y="148" fill="#8b949e" font-size="9"  text-anchor="middle">4 bytes</text>

  <!-- ZWJ 3 -->
  <rect x="524" y="76" width="52" height="40" rx="6" fill="#21262d" stroke="#6e7681" stroke-width="1"/>
  <text x="550" y="93"  fill="#6e7681" font-size="9"  text-anchor="middle">ZWJ</text>
  <text x="550" y="106" fill="#6e7681" font-size="8"  text-anchor="middle">U+200D</text>
  <text x="456" y="158" fill="#6e7681" font-size="9" text-anchor="middle">+</text>
  <text x="550" y="158" fill="#6e7681" font-size="9" text-anchor="middle">+</text>

  <!-- Step 4: Boy -->
  <rect x="594" y="56" width="100" height="80" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="644" y="95"  font-size="30" text-anchor="middle">👦</text>
  <text x="644" y="118" fill="#8b949e" font-size="10" text-anchor="middle">U+1F466</text>
  <text x="644" y="130" fill="#58a6ff" font-size="9"  text-anchor="middle">Boy</text>
  <text x="644" y="148" fill="#8b949e" font-size="9"  text-anchor="middle">4 bytes</text>

  <!-- Arrow down -->
  <text x="380" y="185" fill="#8b949e" font-size="18" text-anchor="middle">↓  renderer sees ZWJ sequences, combines into one glyph</text>

  <!-- Result box -->
  <rect x="240" y="205" width="280" height="72" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="300" y="248" font-size="36" text-anchor="middle">👨‍👩‍👧‍👦</text>
  <text x="500" y="231" fill="#3fb950" font-size="11" text-anchor="middle">Looks like: 1 character</text>
  <text x="500" y="248" fill="#f85149" font-size="11" text-anchor="middle">.length returns: 11</text>
  <text x="500" y="265" fill="#f85149" font-size="11" text-anchor="middle">Byte size: 25 bytes</text>
</svg>
