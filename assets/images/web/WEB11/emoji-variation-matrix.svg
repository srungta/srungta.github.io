<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 310" font-family="'Segoe UI', system-ui, sans-serif">
  <rect width="760" height="310" fill="#0d1117" rx="12"/>

  <text x="380" y="34" fill="#e6edf3" font-size="14" font-weight="700" text-anchor="middle">Emoji Profession Variants — each is a different byte sequence</text>

  <!-- Headers -->
  <text x="150" y="65" fill="#8b949e" font-size="11" text-anchor="middle">👨 + ZWJ +</text>
  <text x="380" y="65" fill="#8b949e" font-size="11" text-anchor="middle">👩 + ZWJ +</text>
  <text x="610" y="65" fill="#8b949e" font-size="11" text-anchor="middle">🧑 + ZWJ +</text>

  <!-- Row 1: Doctor -->
  <rect x="30" y="76" width="240" height="58" rx="7" fill="#161b22" stroke="#1f6feb" stroke-width="1"/>
  <text x="88"  y="112" font-size="30" text-anchor="middle">👨‍⚕️</text>
  <text x="165" y="102" fill="#58a6ff" font-size="12" text-anchor="middle">Male Doctor</text>
  <text x="165" y="118" fill="#8b949e" font-size="9"  text-anchor="middle">U+1F468 U+200D U+2695 U+FE0F</text>
  <text x="165" y="128" fill="#8b949e" font-size="9"  text-anchor="middle">11 bytes</text>

  <rect x="260" y="76" width="240" height="58" rx="7" fill="#161b22" stroke="#da70d6" stroke-width="1"/>
  <text x="318" y="112" font-size="30" text-anchor="middle">👩‍⚕️</text>
  <text x="395" y="102" fill="#da70d6" font-size="12" text-anchor="middle">Female Doctor</text>
  <text x="395" y="118" fill="#8b949e" font-size="9"  text-anchor="middle">U+1F469 U+200D U+2695 U+FE0F</text>
  <text x="395" y="128" fill="#8b949e" font-size="9"  text-anchor="middle">11 bytes</text>

  <rect x="490" y="76" width="240" height="58" rx="7" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="548" y="112" font-size="30" text-anchor="middle">🧑‍⚕️</text>
  <text x="625" y="102" fill="#3fb950" font-size="12" text-anchor="middle">Doctor (neutral)</text>
  <text x="625" y="118" fill="#8b949e" font-size="9"  text-anchor="middle">U+1F9D1 U+200D U+2695 U+FE0F</text>
  <text x="625" y="128" fill="#8b949e" font-size="9"  text-anchor="middle">11 bytes</text>

  <!-- Row 2: Firefighter -->
  <rect x="30" y="148" width="240" height="58" rx="7" fill="#161b22" stroke="#1f6feb" stroke-width="1"/>
  <text x="88"  y="183" font-size="30" text-anchor="middle">👨‍🚒</text>
  <text x="165" y="173" fill="#58a6ff" font-size="12" text-anchor="middle">Male Firefighter</text>
  <text x="165" y="189" fill="#8b949e" font-size="9"  text-anchor="middle">U+1F468 U+200D U+1F692</text>
  <text x="165" y="199" fill="#8b949e" font-size="9"  text-anchor="middle">11 bytes</text>

  <rect x="260" y="148" width="240" height="58" rx="7" fill="#161b22" stroke="#da70d6" stroke-width="1"/>
  <text x="318" y="183" font-size="30" text-anchor="middle">👩‍🚒</text>
  <text x="395" y="173" fill="#da70d6" font-size="12" text-anchor="middle">Female Firefighter</text>
  <text x="395" y="189" fill="#8b949e" font-size="9"  text-anchor="middle">U+1F469 U+200D U+1F692</text>
  <text x="395" y="199" fill="#8b949e" font-size="9"  text-anchor="middle">11 bytes</text>

  <rect x="490" y="148" width="240" height="58" rx="7" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="548" y="183" font-size="30" text-anchor="middle">🧑‍🚒</text>
  <text x="625" y="173" fill="#3fb950" font-size="12" text-anchor="middle">Firefighter (neutral)</text>
  <text x="625" y="189" fill="#8b949e" font-size="9"  text-anchor="middle">U+1F9D1 U+200D U+1F692</text>
  <text x="625" y="199" fill="#8b949e" font-size="9"  text-anchor="middle">11 bytes</text>

  <!-- Note -->
  <rect x="30" y="224" width="700" height="66" rx="8" fill="#1a1a00" stroke="#d29922" stroke-width="1"/>
  <text x="380" y="244" fill="#d29922" font-size="11" font-weight="700" text-anchor="middle">⚠  Why this matters for your system</text>
  <text x="380" y="262" fill="#8b949e" font-size="10" text-anchor="middle">Each variant has a different code point sequence. String equality, sorting, searching, and byte-length</text>
  <text x="380" y="278" fill="#8b949e" font-size="10" text-anchor="middle">calculations treat them as completely unrelated values — even though users see the same profession.</text>
</svg>
