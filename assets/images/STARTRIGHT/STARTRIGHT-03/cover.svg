<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">When 💩 hits the database</title>
  <desc id="desc">Emoji and a Unicode payload marked U+1F4A9 crash into a database, scattering bytes and warning symbols.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#ddd7cd" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#f4f0e8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#191817" stroke-width="8"/>

  <rect x="84" y="88" width="290" height="38" fill="#62cbc9"/>
  <text x="100" y="115" fill="#191817" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="2">START RIGHT</text>
  <text x="84" y="224" fill="#191817" font-family="Arial, Helvetica, sans-serif" font-size="61" font-weight="700">
    <tspan x="84">When 💩 hits</tspan>
    <tspan x="84" dy="74">the database</tspan>
  </text>
  <text x="88" y="362" fill="#191817" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" letter-spacing="2">UNICODE  /  UTF-8  /  PRODUCTION</text>
  <path d="M84 500h430" stroke="#191817" stroke-width="8"/>
  <circle cx="104" cy="540" r="12" fill="#62cbc9" stroke="#191817" stroke-width="5"/>
  <path d="M136 540h190" stroke="#191817" stroke-width="6"/>

  <g transform="rotate(12 785 174)">
    <rect x="640" y="111" width="290" height="126" fill="#f9cc55" stroke="#191817" stroke-width="7"/>
    <rect x="662" y="134" width="246" height="35" fill="#191817"/>
    <text x="785" y="159" fill="#f4f0e8" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" text-anchor="middle" letter-spacing="2">UNICODE PAYLOAD</text>
    <text x="785" y="210" fill="#191817" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="31" font-weight="700" text-anchor="middle">💩 U+1F4A9</text>
  </g>
  <path d="M684 255l-63 41M709 277l-53 57M744 290l-26 61" fill="none" stroke="#ff705d" stroke-width="9"/>

  <text x="695" y="325" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="48" text-anchor="middle">🚀</text>
  <text x="739" y="374" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="42" text-anchor="middle">🔥</text>
  <text x="1101" y="374" font-family="Apple Color Emoji, Segoe UI Emoji, Noto Color Emoji, sans-serif" font-size="46" text-anchor="middle">🤯</text>

  <path d="M771 319v168c0 37 68 67 152 67s152-30 152-67V319" fill="#62cbc9" stroke="#191817" stroke-width="8"/>
  <ellipse cx="923" cy="319" rx="152" ry="58" fill="#62cbc9" stroke="#191817" stroke-width="8"/>
  <path d="M771 399c0 37 68 67 152 67s152-30 152-67M771 474c0 37 68 67 152 67s152-30 152-67" fill="none" stroke="#191817" stroke-width="8"/>
  <ellipse cx="923" cy="319" rx="112" ry="34" fill="#f4f0e8" stroke="#191817" stroke-width="7"/>
  <path d="M845 319h156" stroke="#ff705d" stroke-width="10" stroke-dasharray="18 13"/>

  <path d="M763 286l23 21 24-20 20 23 28-18 14 29 31-10 5 33 32 2-5 32 29 13-15 29 24 22-24 22" fill="none" stroke="#ff705d" stroke-width="9" stroke-linejoin="round"/>
  <path d="M1067 184l17 31 35 7-25 26 5 36-32-16-32 16 6-36-26-26 36-7z" fill="#ff705d" stroke="#191817" stroke-width="6"/>
  <text x="1067" y="253" fill="#191817" font-family="Arial, Helvetica, sans-serif" font-size="43" font-weight="700" text-anchor="middle">!</text>

  <rect x="573" y="401" width="171" height="105" fill="#f4f0e8" stroke="#191817" stroke-width="6" transform="rotate(-7 658 454)"/>
  <text x="658" y="436" fill="#191817" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="middle" transform="rotate(-7 658 454)">F0 9F 92 A9</text>
  <text x="658" y="470" fill="#ff705d" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle" transform="rotate(-7 658 454)">4 BYTES</text>
</svg>