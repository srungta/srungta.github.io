<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Multi-slot local development pit lane</title>
  <desc id="desc">Three isolated application slots sit in a colorful development pit lane while Caddy routes traffic to each one.</desc>
  <defs>
